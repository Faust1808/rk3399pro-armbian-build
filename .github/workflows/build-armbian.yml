name: Build Armbian RK3399

on:
  workflow_dispatch:
    inputs:
      board:
        description: Armbian board family for RK3399Pro-compatible boot flow
        required: true
        default: rockpro64
      release:
        description: Ubuntu release for ROS 2 userspace
        required: true
        default: jammy
      branch:
        description: Kernel branch for this board (rockpro64 supports current/edge in upstream Armbian)
        required: true
        default: current
      build_minimal:
        description: Build minimal image
        required: true
        default: "no"
      build_desktop:
        description: Build desktop image
        required: true
        default: "no"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout Armbian build framework
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: armbian-build

      - name: Copy userpatches
        run: |
          mkdir -p armbian-build/userpatches
          cp -r userpatches/* armbian-build/userpatches/ || true
          chmod +x armbian-build/userpatches/customize-image.sh || true
          # Inject locally extracted RK3399Pro device tree into the image overlay
          mkdir -p armbian-build/userpatches/overlay/usr/share/rk3399pro
          if [ -f "rk3399pro-running.fdt" ]; then
            chmod a+r rk3399pro-running.fdt || true
            cp -f rk3399pro-running.fdt armbian-build/userpatches/overlay/usr/share/rk3399pro/rk3399pro-running.dtb
          fi

      - name: Prepare qemu binfmt on runner
        run: |
          sudo apt-get update
          # Ubuntu runners may not provide qemu-user-binfmt as a separate package.
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo modprobe binfmt_misc || true
          sudo mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc || true
          sudo docker run --rm --privileged multiarch/qemu-user-static --reset -p yes || true
          sudo update-binfmts --enable qemu-arm || true
          sudo update-binfmts --enable qemu-aarch64 || true
          sudo update-binfmts --enable qemu-riscv64 || true
          sudo update-binfmts --enable qemu-loongarch64 || true

      - name: Build image
        working-directory: armbian-build
        run: |
          # Keep host-side qemu/binfmt setup; avoids early bootstrap failures on GitHub runners.
          ./compile.sh \
            BOARD=${{ github.event.inputs.board }} \
            BRANCH=${{ github.event.inputs.branch }} \
            RELEASE=${{ github.event.inputs.release }} \
            BUILD_MINIMAL=${{ github.event.inputs.build_minimal }} \
            BUILD_DESKTOP=${{ github.event.inputs.build_desktop }} \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUTIMAGE=xz \
            EXPERT=yes \
            SHARE_LOG=yes

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: armbian-images
          path: armbian-build/output/images/*
          if-no-files-found: warn

      - name: Upload deb packages
        uses: actions/upload-artifact@v4
        with:
          name: armbian-debs
          path: armbian-build/output/debs/*
          if-no-files-found: warn

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: armbian-logs
          path: armbian-build/output/debug/*
          if-no-files-found: warn
